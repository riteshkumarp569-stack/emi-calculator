<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EMI Calculator</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="container">
  <h1>EMI Calculator</h1>
  <label>Loan Amount (₹)</label>
  <input type="number" id="amount" placeholder="Enter Loan Amount">
  <label>Interest Rate (%)</label>
  <input type="number" id="rate" placeholder="Enter Annual Interest Rate">
  <label>Loan Tenure (Years)</label>
  <input type="number" id="years" placeholder="Enter Loan Tenure">
  <button onclick="calculateEMI()">Calculate EMI</button>
  <div class="result">
    <h3>Monthly EMI: <span id="emi">₹0</span></h3>
    <h3>Total Interest: <span id="interest">₹0</span></h3>
    <h3>Total Payment: <span id="payment">₹0</span></h3>
  </div>
  <hr>
  <p><strong>Name:</strong> Ritesh Kumar Pandey</p>
  <a href="https://digitalheroesco.com" target="_blank"><button class="dh-btn">Built for Digital Heroes</button></a>
</div>
<script src="script.js"></script>
</body>
</html>
